<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A simple, single-file Kanban board with drag-and-drop and cookie persistence.">
    <title>Kanban Board</title>
    <style>
        /* ========================================
           CSS Custom Properties & Theming
           ======================================== */
        :root {
            --color-primary: #2563eb;
            --color-primary-dark: #1e40af;
            --color-success: #10b981;
            --color-warning: #f59e0b;
            --color-danger: #ef4444;
            --color-gray-50: #f9fafb;
            --color-gray-100: #f3f4f6;
            --color-gray-200: #e5e7eb;
            --color-gray-300: #d1d5db;
            --color-gray-400: #9ca3af;
            --color-gray-500: #6b7280;
            --color-gray-600: #4b5563;
            --color-gray-700: #374151;
            --color-gray-800: #1f2937;
            --color-gray-900: #111827;

            --bg-body: #ffffff;
            --bg-card: #ffffff;
            --bg-column: #f3f4f6;
            --text-primary: #1f2937;
            --text-secondary: #6b7280;
            --border-color: #e5e7eb;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-body: #111827;
                --bg-card: #1f2937;
                --bg-column: #0f1419;
                --text-primary: #f9fafb;
                --text-secondary: #d1d5db;
                --border-color: #374151;
            }
        }

        /* ========================================
           Global Styles
           ======================================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            font-size: 14px;
            line-height: 1.5;
            color: var(--text-primary);
            background-color: var(--bg-body);
            transition: background-color 0.2s, color 0.2s;
        }

        /* ========================================
           Container & Layout
           ======================================== */
        .container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            max-width: 100%;
        }

        .header {
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--border-color);
            background-color: var(--bg-body);
        }

        .header h1 {
            font-size: 1.5rem;
            font-weight: 600;
        }

        /* ========================================
           Warning Banner
           ======================================== */
        .warning-banner {
            display: none;
            padding: 0.75rem 1.5rem;
            background-color: #fef3c7;
            border-bottom: 1px solid #fcd34d;
            color: #92400e;
            font-size: 0.875rem;
            align-items: center;
            justify-content: space-between;
        }

        .warning-banner.visible {
            display: flex;
        }

        .warning-banner button {
            background: none;
            border: none;
            color: #92400e;
            cursor: pointer;
            font-size: 1rem;
            padding: 0;
        }

        /* ========================================
           Cookie Size Warning
           ======================================== */
        #cookie-size-warning {
            display: none;
            margin-top: 1.5rem;
            padding: 0.75rem 1.5rem;
            background-color: #fee2e2;
            border: 1px solid #fecaca;
            border-radius: 0.375rem;
            color: #991b1b;
            font-size: 0.875rem;
            line-height: 1.5;
        }

        #cookie-size-warning.visible {
            display: block;
        }

        /* ========================================
           Board Container
           ======================================== */
        .board {
            display: flex;
            flex: 1;
            gap: 1.5rem;
            padding: 1.5rem;
            overflow-x: auto;
            overflow-y: hidden;
        }

        /* ========================================
           Column Styles
           ======================================== */
        .column {
            flex: 0 0 calc(33.333% - 1rem);
            min-width: 280px;
            display: flex;
            flex-direction: column;
            background-color: var(--bg-column);
            border-radius: 0.5rem;
            padding: 1rem;
        }

        .column__header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1rem;
        }

        .column__title {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .column__badge {
            background-color: var(--color-gray-300);
            color: var(--text-primary);
            border-radius: 9999px;
            padding: 0.25rem 0.5rem;
            font-size: 0.75rem;
            font-weight: 600;
        }

        @media (prefers-color-scheme: dark) {
            .column__badge {
                background-color: var(--color-gray-700);
                color: var(--text-secondary);
            }
        }

        .column__cards {
            flex: 1;
            list-style: none;
            min-height: 2rem;
        }

        .column__footer {
            margin-top: 1rem;
        }

        .btn-add-card {
            width: 100%;
            padding: 0.5rem 1rem;
            background-color: var(--color-gray-200);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
            border-radius: 0.375rem;
            font-size: 0.875rem;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .btn-add-card:hover {
            background-color: var(--color-gray-300);
        }

        @media (prefers-color-scheme: dark) {
            .btn-add-card {
                background-color: var(--color-gray-700);
                border-color: var(--color-gray-600);
            }

            .btn-add-card:hover {
                background-color: var(--color-gray-600);
            }
        }

        /* ========================================
           Card Styles
           ======================================== */
        .card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-left: 4px solid transparent;
            border-radius: 0.375rem;
            padding: 0.75rem;
            margin-bottom: 0.75rem;
            cursor: grab;
            transition: box-shadow 0.2s, opacity 0.2s;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .card:active {
            cursor: grabbing;
            opacity: 0.8;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .card--overdue {
            border-left-color: var(--color-danger);
        }

        .card--dragging {
            opacity: 0.5;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }

        .card__title {
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--text-primary);
            word-break: break-word;
        }

        .card__description {
            font-size: 0.8rem;
            color: var(--text-secondary);
            overflow: hidden;
            text-overflow: ellipsis;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            word-break: break-word;
        }

        .card__meta {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.5rem;
            font-size: 0.75rem;
        }

        .card__priority {
            display: inline-block;
            padding: 0.25rem 0.5rem;
            border-radius: 0.25rem;
            font-weight: 600;
            text-transform: uppercase;
            background-color: var(--color-gray-200);
            color: var(--text-primary);
        }

        .card__priority--high {
            background-color: #fee2e2;
            color: #991b1b;
        }

        .card__priority--medium {
            background-color: #fef3c7;
            color: #92400e;
        }

        .card__priority--low {
            background-color: #dcfce7;
            color: #166534;
        }

        @media (prefers-color-scheme: dark) {
            .card__priority--high {
                background-color: #7f1d1d;
                color: #fecaca;
            }

            .card__priority--medium {
                background-color: #78350f;
                color: #fcd34d;
            }

            .card__priority--low {
                background-color: #15803d;
                color: #86efac;
            }
        }

        .card__date {
            color: var(--text-secondary);
        }

        .card__actions {
            display: none;
            gap: 0.5rem;
            margin-top: 0.5rem;
        }

        .card:hover .card__actions {
            display: flex;
        }

        .btn-card-action {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 1rem;
            padding: 0;
            transition: color 0.2s;
            flex: 1;
            text-align: center;
        }

        .btn-card-action:hover {
            color: var(--text-primary);
        }

        /* ========================================
           Modal Styles
           ======================================== */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.visible {
            display: flex;
        }

        .modal__content {
            background-color: var(--bg-body);
            border-radius: 0.5rem;
            padding: 2rem;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }

        .modal__title {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            color: var(--text-primary);
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: var(--text-primary);
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 0.5rem 0.75rem;
            border: 1px solid var(--border-color);
            border-radius: 0.375rem;
            font-size: 0.9rem;
            color: var(--text-primary);
            background-color: var(--bg-card);
            font-family: inherit;
            transition: border-color 0.2s;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--color-primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }

        .modal__actions {
            display: flex;
            gap: 1rem;
            justify-content: flex-end;
            margin-top: 2rem;
        }

        .btn {
            padding: 0.5rem 1.5rem;
            border: none;
            border-radius: 0.375rem;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .btn-primary {
            background-color: var(--color-primary);
            color: white;
        }

        .btn-primary:hover {
            background-color: var(--color-primary-dark);
        }

        .btn-secondary {
            background-color: var(--color-gray-200);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
        }

        .btn-secondary:hover {
            background-color: var(--color-gray-300);
        }

        @media (prefers-color-scheme: dark) {
            .btn-secondary {
                background-color: var(--color-gray-700);
            }

            .btn-secondary:hover {
                background-color: var(--color-gray-600);
            }
        }

        /* ========================================
           Form Validation Error
           ======================================== */
        .form-error {
            display: block;
            color: var(--color-danger);
            font-size: 0.8rem;
            margin-top: 0.375rem;
        }

        /* ========================================
           Responsive Design
           ======================================== */
        @media (max-width: 600px) {
            .board {
                flex-direction: column;
                gap: 1rem;
                padding: 1rem;
            }

            .column {
                flex: 0 0 auto;
                min-width: unset;
            }

            .modal__content {
                width: 95%;
                padding: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <h1>Kanban Board</h1>
        </header>

        <!-- Warning Banner -->
        <div class="warning-banner" id="warningBanner" aria-live="polite" aria-label="Warning message">
            <span id="warningMessage">You have more than 20 cards — cookie storage may be limited.</span>
            <button aria-label="Dismiss warning">✕</button>
        </div>

        <!-- Board -->
        <main class="board" id="board">
            <!-- To Do Column -->
            <section class="column" data-column="todo">
                <div class="column__header">
                    <h2 class="column__title">To Do</h2>
                    <span class="column__badge" aria-label="Card count">0</span>
                </div>
                <ul class="column__cards" aria-label="To Do cards" role="list">
                    <!-- Cards will be rendered here -->
                </ul>
                <div class="column__footer">
                    <button class="btn-add-card" aria-label="Add a new card to To Do">+ Add Card</button>
                </div>
            </section>

            <!-- In Progress Column -->
            <section class="column" data-column="inprogress">
                <div class="column__header">
                    <h2 class="column__title">In Progress</h2>
                    <span class="column__badge" aria-label="Card count">0</span>
                </div>
                <ul class="column__cards" aria-label="In Progress cards" role="list">
                    <!-- Cards will be rendered here -->
                </ul>
                <div class="column__footer">
                    <button class="btn-add-card" aria-label="Add a new card to In Progress">+ Add Card</button>
                </div>
            </section>

            <!-- Done Column -->
            <section class="column" data-column="done">
                <div class="column__header">
                    <h2 class="column__title">Done</h2>
                    <span class="column__badge" aria-label="Card count">0</span>
                </div>
                <ul class="column__cards" aria-label="Done cards" role="list">
                    <!-- Cards will be rendered here -->
                </ul>
                <div class="column__footer">
                    <button class="btn-add-card" aria-label="Add a new card to Done">+ Add Card</button>
                </div>
            </section>
        </main>

        <!-- Cookie Size Warning -->
        <p id="cookie-size-warning" role="alert" aria-live="polite">
            Cookie storage is nearly full. Remove some cards to avoid data loss.
        </p>
    </div>

    <!-- Card Modal -->
    <div class="modal" id="cardModal" role="dialog" aria-labelledby="modalTitle" aria-hidden="true">
        <div class="modal__content">
            <h2 class="modal__title" id="modalTitle">Create Card</h2>
            <form id="cardForm">
                <div class="form-group">
                    <label for="cardTitle">Title <span aria-label="required">*</span></label>
                    <input
                        type="text"
                        id="cardTitle"
                        name="title"
                        placeholder="Card title..."
                        required
                        aria-required="true"
                    />
                </div>

                <div class="form-group">
                    <label for="cardDescription">Description</label>
                    <textarea
                        id="cardDescription"
                        name="description"
                        placeholder="Optional description..."
                    ></textarea>
                </div>

                <div class="form-group">
                    <label for="cardPriority">Priority</label>
                    <select id="cardPriority" name="priority">
                        <option value="medium">Medium</option>
                        <option value="high">High</option>
                        <option value="low">Low</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="cardDueDate">Due Date</label>
                    <input
                        type="date"
                        id="cardDueDate"
                        name="dueDate"
                    />
                </div>

                <div class="modal__actions">
                    <button type="button" class="btn btn-secondary" id="cancelBtn">Cancel</button>
                    <button type="submit" class="btn btn-primary" id="saveBtn">Save</button>
                </div>
            </form>
        </div>
    </div>

    <script>

})();

        'use strict';

        // ========================================
        // Module-level state & modal context
        // ========================================

        /** The current board state, loaded once and mutated in place. */
        let state = null;

        /**
         * Tracks which mode the modal is in plus the relevant IDs.
         * mode: 'create' | 'edit'
         * columnId: string
         * cardId: string | null (null in create mode)
         */
        let modalContext = { mode: null, columnId: null, cardId: null };

        /** The element that triggered the modal; focus returns here on close. */
        let modalTriggerElement = null;

        /** Track whether the card-count warning banner was dismissed in the current session. */
        let bannerDismissed = false;

        /** Track Sortable instances so they can be destroyed on re-render. */
        let sortableInstances = [];

        // ========================================
        // Utility helpers
        // ========================================

        /**
         * Generate a unique ID for a card.
         * Uses crypto.randomUUID() when available, falls back to timestamp-based shim.
         */
        function generateId() {
            if (typeof crypto !== 'undefined' && crypto.randomUUID) {
                return crypto.randomUUID();
            }
            // Fallback for older browsers
            return Date.now().toString(36) + Math.random().toString(36).slice(2);
        }

        /**
         * Escape HTML special characters to prevent XSS.
         */
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        /**
         * Return true when dateStr is a valid YYYY-MM-DD representing a date
         * strictly before today (midnight local time). Returns false for null,
         * empty string, today, or any future date.
         */
        function isOverdue(dateStr) {
            if (!dateStr) return false;
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            const date = new Date(dateStr + 'T00:00:00');
            return date < today;
        }

        /**
         * Format a YYYY-MM-DD string to a locale-friendly display string.
         * Appending T00:00:00 prevents UTC-offset display issues.
         */
        function formatDate(dateStr) {
            if (!dateStr) return '';
            return new Date(dateStr + 'T00:00:00').toLocaleDateString();
        }

        // ========================================
        // State Management
        // ========================================

        /**
         * Parse the kanban_state cookie and return the state object.
         * If the cookie is absent or its JSON is malformed, returns a default state
         * with three empty columns (todo, inprogress, done).
         */
        function loadState() {
            const defaultState = {
                columns: {
                    todo: { cards: [] },
                    inprogress: { cards: [] },
                    done: { cards: [] }
                }
            };

            try {
                // Parse document.cookie string: key1=value1; key2=value2; ...
                const cookies = document.cookie.split('; ');
                const kanbanStateCookie = cookies.find(cookie => cookie.startsWith('kanban_state='));

                if (!kanbanStateCookie) {
                    return defaultState;
                }

                // Extract the value and decode
                const cookieValue = kanbanStateCookie.substring('kanban_state='.length);
                const decodedValue = decodeURIComponent(cookieValue);
                const parsed = JSON.parse(decodedValue);

                // Validate state structure
                if (parsed && parsed.columns &&
                    parsed.columns.todo && Array.isArray(parsed.columns.todo.cards) &&
                    parsed.columns.inprogress && Array.isArray(parsed.columns.inprogress.cards) &&
                    parsed.columns.done && Array.isArray(parsed.columns.done.cards)) {
                    return parsed;
                }

                return defaultState;
            } catch (error) {
                // JSON parse error or any other error - return default state
                console.error('Error parsing kanban state:', error);
                return defaultState;
            }
        }

        /**
         * Serialize the state object to JSON, URL-encode it, and write it to the kanban_state cookie.
         * Uses path=/ and SameSite=Lax. No expiry is set (session cookie).
         * Calls checkWarnings with the serialised JSON to check for card count and size limits.
         */
        function saveState(currentState) {
            try {
                const jsonString = JSON.stringify(currentState);
                const encodedValue = encodeURIComponent(jsonString);

                // Set the cookie
                document.cookie = `kanban_state=${encodedValue}; path=/; SameSite=Lax`;

                // Check warnings after saving state
                checkWarnings(currentState, jsonString);
            } catch (error) {
                console.error('Error saving kanban state:', error);
            }
        }

        // ========================================
        // Warning Checks
        // ========================================

        /**
         * Check both card count and cookie size limits.
         * Called at the end of saveState with the serialised JSON string.
         * @param {Object} state - The current board state
         * @param {string} serialisedJson - The serialised JSON string (already computed)
         */
        function checkWarnings(state, serialisedJson) {
            // Check card count warning
            const totalCards = Object.values(state.columns)
                .reduce((sum, col) => sum + col.cards.length, 0);

            const banner = document.getElementById('warningBanner');

            if (totalCards > 20) {
                // Show banner if count exceeds 20 and it hasn't been dismissed
                if (banner && !bannerDismissed) {
                    banner.classList.add('visible');
                }
            } else {
                // Hide banner if count drops to 20 or fewer, and reset the dismissed flag
                if (banner) {
                    banner.classList.remove('visible');
                }
                bannerDismissed = false;
            }

            // Check cookie size warning
            const jsonSize = serialisedJson.length; // Length in UTF-16 code units; approximation for byte count
            const cookieSizeWarning = document.getElementById('cookie-size-warning');

            if (jsonSize > 3800) {
                // Show cookie size warning if payload exceeds 3800 bytes
                if (cookieSizeWarning) {
                    cookieSizeWarning.classList.add('visible');
                }
            } else {
                // Hide cookie size warning if payload is within safe range
                if (cookieSizeWarning) {
                    cookieSizeWarning.classList.remove('visible');
                }
            }
        }

        // ========================================
        // Board Rendering
        // ========================================

        /**
         * Clear the three column card-list elements and re-populate them from state.
         * Renders full card content: title, description, priority badge, due date, and action buttons.
         * Updates the column badge to reflect the current card count.
         */
        function renderBoard(currentState) {
            const columnIds = ['todo', 'inprogress', 'done'];

            columnIds.forEach(columnId => {
                const columnElement = document.querySelector(`[data-column="${columnId}"]`);
                if (!columnElement) return;

                const cardsList = columnElement.querySelector('.column__cards');
                const badgeElement = columnElement.querySelector('.column__badge');

                // Clear existing cards
                cardsList.innerHTML = '';

                const cards = currentState.columns[columnId].cards || [];

                // Render each card
                cards.forEach(card => {
                    const cardElement = document.createElement('li');
                    cardElement.className = 'card';

                    // Apply overdue class when due date is strictly before today
                    if (isOverdue(card.dueDate)) {
                        cardElement.classList.add('card--overdue');
                    }

                    cardElement.setAttribute('data-card-id', card.id);
                    cardElement.setAttribute('data-column-id', columnId);

                    // Accessible description of the card
                    const dateLabel = card.dueDate
                        ? `due ${formatDate(card.dueDate)}`
                        : 'no due date';
                    cardElement.setAttribute(
                        'aria-label',
                        `Card: ${card.title}, priority ${card.priority || 'medium'}, ${dateLabel}`
                    );

                    // Priority badge display
                    const priority = card.priority || 'medium';
                    const priorityLabel = priority.charAt(0).toUpperCase() + priority.slice(1);

                    // Build card inner HTML
                    let cardHTML = `<div class="card__title">${escapeHtml(card.title)}</div>`;

                    if (card.description) {
                        cardHTML += `<div class="card__description">${escapeHtml(card.description)}</div>`;
                    }

                    cardHTML += `
                        <div class="card__meta">
                            <span class="card__priority card__priority--${escapeHtml(priority)}">${escapeHtml(priorityLabel)}</span>
                            ${card.dueDate ? `<span class="card__date">${escapeHtml(formatDate(card.dueDate))}</span>` : ''}
                        </div>
                        <div class="card__actions">
                            <button class="btn-card-action btn-edit" aria-label="Edit card ${escapeHtml(card.title)}">✏️</button>
                            <button class="btn-card-action btn-delete" aria-label="Delete card ${escapeHtml(card.title)}">🗑️</button>
                        </div>
                    `;

                    cardElement.innerHTML = cardHTML;

                    // Attach edit/delete listeners after setting innerHTML
                    cardElement.querySelector('.btn-edit').addEventListener('click', (e) => {
                        e.stopPropagation();
                        openModal('edit', columnId, card.id, e.currentTarget);
                    });

                    cardElement.querySelector('.btn-delete').addEventListener('click', (e) => {
                        e.stopPropagation();
                        deleteCard(columnId, card.id);
                    });

                    cardsList.appendChild(cardElement);
                });

                // Update badge count
                if (badgeElement) {
                    badgeElement.textContent = cards.length;
                }
            });

            // Re-initialise drag-and-drop so newly created cards are also draggable
            initializeSortable();
        }

        // ========================================
        // Drag-and-Drop (SortableJS)
        // ========================================

        /**
         * Initialise SortableJS on each column's card list.
         * Destroys any existing instances first to avoid duplicate listeners.
         * The onEnd handler reads card order from the DOM (data-card-id attributes)
         * and rebuilds state accordingly, then persists.
         */
        function initializeSortable() {
            // Destroy previous instances
            sortableInstances.forEach(instance => {
                try { instance.destroy(); } catch (e) { /* ignore */ }
            });
            sortableInstances = [];

            const columnIds = ['todo', 'inprogress', 'done'];

            columnIds.forEach(columnId => {
                const columnEl = document.querySelector(`[data-column="${columnId}"]`);
                if (!columnEl) return;

                const cardsList = columnEl.querySelector('.column__cards');
                if (!cardsList) return;

                const instance = new Sortable(cardsList, {
                    group: 'cards',
                    animation: 150,
                    ghostClass: 'card--dragging',
                    onEnd: function() {
                        // Rebuild state by reading card order directly from the DOM
                        // This is more reliable than relying on SortableJS event indices
                        columnIds.forEach(colId => {
                            const colEl = document.querySelector(`[data-column="${colId}"]`);
                            if (!colEl) return;

                            const cardEls = colEl.querySelectorAll('[data-card-id]');
                            const allCards = Object.values(state.columns)
                                .flatMap(col => col.cards);

                            state.columns[colId].cards = Array.from(cardEls).map(el => {
                                const cardId = el.getAttribute('data-card-id');
                                return allCards.find(c => c.id === cardId);
                            }).filter(Boolean);
                        });

                        saveState(state);

                        // Update column badge counts without full re-render (avoids destroying drag state)
                        columnIds.forEach(colId => {
                            const colEl = document.querySelector(`[data-column="${colId}"]`);
                            if (!colEl) return;
                            const badge = colEl.querySelector('.column__badge');
                            if (badge) badge.textContent = state.columns[colId].cards.length;
                        });
                    }
                });

                sortableInstances.push(instance);
            });
        }

        // ========================================
        // Card CRUD
        // ========================================

        /**
         * Remove a card from state, re-render, and persist.
         */
        function deleteCard(columnId, cardId) {
            const cards = state.columns[columnId].cards;
            const idx = cards.findIndex(c => c.id === cardId);
            if (idx !== -1) {
                cards.splice(idx, 1);
                renderBoard(state);
                saveState(state);
            }
        }

        // ========================================
        // Modal
        // ========================================

        /**
         * Open the card modal in the given mode.
         * Stores context at module level so the Save handler can read it without closures over DOM.
         */
        function openModal(mode, columnId, cardId, triggerElement) {
            modalContext = { mode, columnId, cardId };
            modalTriggerElement = triggerElement || null;

            const modal = document.getElementById('cardModal');
            const modalTitle = document.getElementById('modalTitle');
            const titleInput = document.getElementById('cardTitle');
            const descInput = document.getElementById('cardDescription');
            const prioritySelect = document.getElementById('cardPriority');
            const dueDateInput = document.getElementById('cardDueDate');

            // Clear the form and any previous validation errors
            document.getElementById('cardForm').reset();
            const errorEl = document.getElementById('titleError');
            if (errorEl) errorEl.textContent = '';

            if (mode === 'edit') {
                modalTitle.textContent = 'Edit Card';
                // Pre-populate with the card's current values
                const card = state.columns[columnId].cards.find(c => c.id === cardId);
                if (card) {
                    titleInput.value = card.title || '';
                    descInput.value = card.description || '';
                    prioritySelect.value = card.priority || 'medium';
                    dueDateInput.value = card.dueDate || '';
                }
            } else {
                modalTitle.textContent = 'Add Card';
            }

            modal.classList.add('visible');
            modal.setAttribute('aria-hidden', 'false');
            titleInput.focus();
        }

        /**
         * Close the modal without modifying state.
         * Returns focus to the element that opened the modal.
         */
        function closeModal() {
            const modal = document.getElementById('cardModal');
            modal.classList.remove('visible');
            modal.setAttribute('aria-hidden', 'true');

            // Return focus to triggering element
            if (modalTriggerElement) {
                modalTriggerElement.focus();
            }

            modalContext = { mode: null, columnId: null, cardId: null };
            modalTriggerElement = null;
        }

        /**
         * Handle the Save button.
         * Validates title, then either creates a new card or updates an existing one.
         */
        function handleSave() {
            const titleInput = document.getElementById('cardTitle');
            const descInput = document.getElementById('cardDescription');
            const prioritySelect = document.getElementById('cardPriority');
            const dueDateInput = document.getElementById('cardDueDate');

            const title = titleInput.value.trim();

            // Ensure the error element exists (create lazily if needed)
            let errorEl = document.getElementById('titleError');
            if (!errorEl) {
                errorEl = document.createElement('span');
                errorEl.id = 'titleError';
                errorEl.className = 'form-error';
                errorEl.setAttribute('aria-live', 'polite');
                titleInput.parentNode.appendChild(errorEl);
            }

            // Inline validation — title is required
            if (!title) {
                errorEl.textContent = 'Title is required.';
                titleInput.focus();
                return;
            }

            errorEl.textContent = '';

            const { mode, columnId, cardId } = modalContext;

            if (mode === 'create') {
                const newCard = {
                    id: generateId(),
                    title,
                    description: descInput.value.trim(),
                    priority: prioritySelect.value,
                    dueDate: dueDateInput.value || null
                };
                state.columns[columnId].cards.push(newCard);
            } else if (mode === 'edit') {
                const card = state.columns[columnId].cards.find(c => c.id === cardId);
                if (card) {
                    card.title = title;
                    card.description = descInput.value.trim();
                    card.priority = prioritySelect.value;
                    card.dueDate = dueDateInput.value || null;
                }
            }

            renderBoard(state);
            saveState(state);
            closeModal();
        }

        // ========================================
        // Focus Trap Helper
        // ========================================

        /**
         * Return all keyboard-focusable elements within a container.
         */
        function getFocusableElements(container) {
            return Array.from(container.querySelectorAll(
                'a[href], button:not([disabled]), textarea, input, select, [tabindex]:not([tabindex="-1"])'
            ));
        }

        // ========================================
        // Event Listeners
        // ========================================

        function initializeEventListeners() {
            // Dismiss warning banner
            const warningBtn = document.querySelector('.warning-banner button');
            if (warningBtn) {
                warningBtn.addEventListener('click', () => {
                    bannerDismissed = true;
                    document.getElementById('warningBanner').classList.remove('visible');
                });
            }

            // "+ Add Card" buttons — open modal in create mode
            document.querySelectorAll('.btn-add-card').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const column = e.currentTarget.closest('[data-column]');
                    const columnId = column.getAttribute('data-column');
                    openModal('create', columnId, null, e.currentTarget);
                });
            });

            // Cancel button
            document.getElementById('cancelBtn').addEventListener('click', closeModal);

            // Form submission (Save button)
            document.getElementById('cardForm').addEventListener('submit', (e) => {
                e.preventDefault();
                handleSave();
            });

            // Backdrop click — close only when clicking the overlay itself, not the modal card
            const modal = document.getElementById('cardModal');
            modal.addEventListener('click', (e) => {
                if (e.target === modal) {
                    closeModal();
                }
            });

            // Escape key to close modal + Tab focus trap
            document.addEventListener('keydown', (e) => {
                if (!modal.classList.contains('visible')) return;

                if (e.key === 'Escape') {
                    closeModal();
                    return;
                }

                if (e.key === 'Tab') {
                    const focusable = getFocusableElements(modal.querySelector('.modal__content'));
                    if (focusable.length === 0) return;

                    const first = focusable[0];
                    const last = focusable[focusable.length - 1];

                    if (e.shiftKey) {
                        // Shift-Tab: wrap backward from first to last
                        if (document.activeElement === first) {
                            e.preventDefault();
                            last.focus();
                        }
                    } else {
                        // Tab: wrap forward from last to first
                        if (document.activeElement === last) {
                            e.preventDefault();
                            first.focus();
                        }
                    }
                }
            });
        }

        // ========================================
        // Initialisation
        // ========================================

        /**
         * Initialize the board on page load.
         * Load state from cookie, render it, and wire up all event listeners.
         */
        function initializeBoard() {
            state = loadState();
            renderBoard(state);
            initializeEventListeners();
        }

        document.addEventListener('DOMContentLoaded', initializeBoard);
    </script>
</body>
</html>
